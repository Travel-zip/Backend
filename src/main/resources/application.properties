spring.application.name=demo
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-5.2
spring.ai.openai.chat.options.temperature=1
tour.api.key=${TOUR_API_KEY}



app.openai.extract.model=gpt-4o-mini
app.openai.extract.temperature=0


app.place.extract.debounce-ms=2500
app.place.extract.max-lines=6



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false


spring.datasource.url=jdbc:mysql://localhost:3306/travelzip?serverTimezone=Asia/Seoul&characterEncoding=utf8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# [??] Auth / JWT ??
# =========================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-ttl-ms=3600000

# =========================
# [??] Email verification (in-memory)
# =========================
app.email.verify.code-ttl-ms=300000
app.email.verify.ok-ttl-ms=1800000

# =========================
# [??] CORS (React dev server)
# =========================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://travel-zip.site,https://www.travel-zip.site


# =========================
# [??] SMTP (?: Gmail)
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true